<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>用户管理 - 温州乐翼</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.4.4/dist/index.css">
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus@2.4.4/dist/index.full.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "PingFang SC","Microsoft YaHei",Arial,sans-serif; background: #f0f2f5; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #001529; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100; }
    .sidebar-logo { height: 60px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,.1); color: #fff; font-size: 18px; font-weight: 600; }
    .sidebar-logo span { color: #1890ff; margin-right: 4px; }
    .sidebar-nav { padding: 12px 0; }
    .nav-item { display: flex; align-items: center; padding: 12px 20px; color: rgba(255,255,255,.65); font-size: 14px; cursor: pointer; transition: all .2s; text-decoration: none; gap: 10px; }
    .nav-item:hover, .nav-item.active { background: rgba(24,144,255,.15); color: #fff; border-right: 3px solid #1890ff; }
    .main-content { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }
    .topbar { height: 60px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .breadcrumb { font-size: 14px; color: #666; }
    .page-body { padding: 24px; flex: 1; }
    .page-title { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 20px; }
    .table-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  </style>
</head>
<body>
  <div id="app">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-logo"><span>乐翼</span>管理</div>
        <nav class="sidebar-nav">
          <a href="index.html" class="nav-item">仪表盘</a>
          <a href="products.html" class="nav-item">商品管理</a>
          <a href="categories.html" class="nav-item">分类管理</a>
          <a href="orders.html" class="nav-item">订单管理</a>
          <a href="banners.html" class="nav-item">轮播图管理</a>
          <a href="users.html" class="nav-item active">用户管理</a>
        </nav>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div class="breadcrumb">首页 / 用户管理</div>
          <div><el-button size="small" @click="logout">退出登录</el-button></div>
        </header>
        <div class="page-body">
          <div class="page-title">用户列表</div>
          <div class="table-card">
            <el-table :data="users" v-loading="loading" stripe border>
              <el-table-column prop="id" label="ID" width="80" align="center"></el-table-column>
              <el-table-column prop="username" label="用户名" min-width="150"></el-table-column>
              <el-table-column prop="phone" label="手机号" min-width="120"></el-table-column>
              <el-table-column prop="role" label="角色" width="100" align="center">
                <template #default="scope">
                  <el-tag :type="scope.row.role === 'admin' ? 'danger' : 'primary'" size="small">
                    {{ scope.row.role === 'admin' ? '管理员' : '普通用户' }}
                  </el-tag>
                </template>
              </el-table-column>
              <el-table-column prop="created_at" label="注册时间" min-width="150"></el-table-column>
              <el-table-column prop="remark" label="备注" min-width="200">
                <template #default="scope">
                  <el-input v-model="scope.row.remark" size="small" placeholder="添加备注..." @blur="saveRemark(scope.row)"></el-input>
                </template>
              </el-table-column>
              <el-table-column label="操作" width="100" align="center">
                <template #default="scope">
                  <el-button type="primary" size="small" @click="editUser(scope.row)">编辑</el-button>
                </template>
              </el-table-column>
            </el-table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script>
    const { createApp, ref, onMounted } = Vue;
    const { ElMessage } = ElementPlus;

    createApp({
      setup() {
        const loading = ref(false);
        const users = ref([]);

        const loadUsers = async () => {
          loading.value = true;
          try {
            const token = localStorage.getItem('admin_token');
            const res = await fetch('/api/admin/users', { 
              headers: { 'Authorization': 'Bearer ' + token } 
            });
            const data = await res.json();
            if (data.code === 200) {
              users.value = data.data;
            } else {
              ElMessage.error(data.message || '加载失败');
            }
          } catch (e) {
            ElMessage.error('网络错误: ' + e.message);
          }
          loading.value = false;
        };

        const saveRemark = async (user) => {
          try {
            const token = localStorage.getItem('admin_token');
            const res = await fetch('/api/admin/users/' + user.id + '/remark', {
              method: 'PUT',
              headers: { 
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ remark: user.remark })
            });
            const data = await res.json();
            if (data.code === 200) {
              ElMessage.success('备注已保存');
            } else {
              ElMessage.error(data.message || '保存失败');
            }
          } catch (e) {
            ElMessage.error('网络错误: ' + e.message);
          }
        };

        const editUser = (user) => {
          // 可以扩展为打开编辑对话框
          ElMessage.info('编辑用户: ' + user.username);
        };

        const logout = () => {
          localStorage.removeItem('admin_token');
          localStorage.removeItem('admin_user');
          location.href = 'login.html';
        };

        onMounted(loadUsers);

        return { loading, users, logout, saveRemark, editUser };
      }
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
