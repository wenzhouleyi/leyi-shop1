# ============================================
# 温州乐翼电商系统 - Nginx 配置文件
# 路径: /etc/nginx/sites-available/leyi.conf
# ============================================

upstream leyi_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# 限制请求体大小
client_max_body_size 10M;

server {
    listen 80;
    server_name www.leyi.com leyi.com;
    
    # 重定向到 HTTPS (可选，取消注释启用)
    # return 301 https://$server_name$request_uri;

    # 字符编码
    charset utf-8;

    # 日志
    access_log /var/log/nginx/leyi_access.log;
    error_log /var/log/nginx/leyi_error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 上传文件
    location /uploads/ {
        alias /var/www/leyi-shop/backend/uploads/;
        expires 7d;
    }

    # API 代理
    location /api/ {
        proxy_pass http://leyi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # 后台管理
    location /admin/ {
        proxy_pass http://leyi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 前台静态文件
    location / {
        root /var/www/leyi-shop/website;
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}

