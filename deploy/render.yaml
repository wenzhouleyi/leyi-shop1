# Render.com 部署配置
# https://render.com/docs/deploy-node-express

services:
  - type: web
    name: leyi-shop
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: node server.js
    healthCheckPath: /api/banners
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
